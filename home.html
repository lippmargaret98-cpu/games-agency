<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جعفر جيمز - عالم التحدي</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        canvas { border: 4px solid #00d4ff; background: #006400; margin-top: 20px; }
        .btn { padding: 15px 30px; background: #00d4ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>لعبة البلياردو الخاصة بـ جعفر</h1>
    <canvas id="billiardTable" width="600" height="400"></canvas>
    <br><br>
    <button class="btn" onclick="resetBall()">إعادة الكرة</button>

    <script>
        const canvas = document.getElementById("billiardTable");
        const ctx = canvas.getContext("2d");
        let ballX = 300, ballY = 200, speedX = 4, speedY = 4;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(ballX, ballY, 15, 0, Math.PI*2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            
            ballX += speedX; ballY += speedY;
            if(ballX > 585 || ballX < 15) speedX = -speedX;
            if(ballY > 385 || ballY < 15) speedY = -speedY;
            requestAnimationFrame(draw);
        }
        function resetBall() { ballX = 300; ballY = 200; }
        draw();
    </script>
</body>
</html>
