<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>وكالة الألعاب - تحدي الرهان</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .header { padding: 20px; background: #111; border-bottom: 3px solid #FFD700; }
        .balance { font-size: 24px; color: #FFD700; font-weight: bold; }
        .game-area { margin: 20px; padding: 20px; border: 2px solid #333; border-radius: 15px; }
        .btn { padding: 15px 25px; background: #FFD700; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>وكالة الألعاب السورية</h1>
        <div class="balance">الرصيد الحالي: <span id="main-balance">5000</span></div>
    </div>

    <div class="game-area">
        <h2>🎱 لعبة البلياردو (رهان 5000)</h2>
        <button class="btn" onclick="playBilliard()">ابدأ البلياردو</button>
    </div>

    <div class="game-area">
        <h2>🎲 المونوبولي (رهان 25000)</h2>
        <button class="btn" onclick="playMonopoly()">ابدأ المونوبولي</button>
    </div>

    <script>
        let balance = 5000;
        function updateUI() { document.getElementById('main-balance').innerText = balance; }

        function playBilliard() {
            if(balance < 5000) { alert("رصيدك غير كافٍ!"); return; }
            balance -= 5000;
            let win = Math.random() > 0.5;
            if(win) { balance += 12000; alert("مبروك! ربحت 7000 زيادة!"); }
            else { alert("للأسف، خسرت الرهان!"); }
            updateUI();
        }

        function playMonopoly() {
            if(balance < 25000) { alert("تحتاج 25,000 للبدء!"); return; }
            balance -= 25000;
            let win = Math.random() > 0.4; // حظ أفضل في المونوبولي
            if(win) { balance += 50000; alert("ملك التجارة! ربحت 25,000 إضافية!"); }
            else { alert("خسرت في تجارة المونوبولي!"); }
            updateUI();
        }
    </script>
</body>
</html>
