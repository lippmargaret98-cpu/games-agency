<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم التحدي - Games Hub</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* الخلفية المتحركة */
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(45deg, #000, #1a1a2e, #16213e); background-size: 400% 400%; animation: gradient 10s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        h1 { margin-top: 50px; font-size: 3em; text-shadow: 0 0 20px #00d4ff; }
        
        .container { display: flex; gap: 20px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
        
        .card { width: 250px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; text-align: center; transition: 0.3s; border: 2px solid transparent; cursor: pointer; }
        .card:hover { transform: scale(1.1); border: 2px solid #00d4ff; background: rgba(0,0,0,0.5); }
        
        .btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #00d4ff; color: #000; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <h1>ألعاب التحدي</h1>
    
    <div class="container">
        <div class="card" onclick="window.open('https://html5.gamedistribution.com/rvvASMiR/83c830c293744955b23d92842c23178e/index.html', '_blank')">
            <h2>🎱 البلياردو</h2>
            <p>تحدي الأصدقاء</p>
            <div class="btn">العب الآن</div>
        </div>
        <div class="card" onclick="window.open('https://games.gamedistribution.com/1d50c9540b61405e94119d659423b432/', '_blank')">
            <h2>🎲 المونوبولي</h2>
            <p>ملك التجارة</p>
            <div class="btn">العب الآن</div>
        </div>
    </div>
</body>
</html>
